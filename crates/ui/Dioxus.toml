[application]
assets_dir = "assets"

[components]
components_dir = "src/components/ui"

[web.app]

# HTML title tag content
title = "Best of Rust DEV"

# include `assets` in web platform
[web.resource]

# Additional CSS style files
style = []

# Additional JavaScript files
script = []

[web.resource.dev]

# Javascript code file
# serve: [dev-server] only
script = []

[web.wasm_opt]
level = "0"
debug = true
keep_names = true

[web.watcher]
index_on_404 = true
watch_path = ["src"]
